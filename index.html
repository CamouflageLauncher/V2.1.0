         :root {

         }

         *{margin:0;padding:0;box-sizing:border-box;font-family:Roboto, sans-serif}
         html,body{height:100%;background:#0e141f;color:#ddd;overflow-x:hidden;}
         
         /* NAVIGATION BAR */
         .sidebar{
         position:fixed;top:0;left:0;right:0;height:56px;
         background: var(--primary-color); border-bottom:6px solid #fff;
         display:flex;align-items:center;justify-content:space-between;
         padding:0 12px;z-index:60;
         }
         .sidebar-left{display:flex;align-items:center;gap:12px}
         .nav-list{display:flex;gap:16px;align-items:center;list-style:none}
         .nav-list img{width:36px;height:36px;cursor:pointer}
         
         /* LOGO STYLING */
         .launcher-logo {
            height: 40px;
            width: auto;
            margin-left: 0px;
            margin-right: 10px;
            border-radius: 5px;
         }
         .logo-text {
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            margin-right: 15px;
         }

         #accountDisplay{display:flex;align-items:center;gap:8px;color:#fff;font-size:1.05rem}
         #pfpDisplay{
         width:38px;height:38px;border-radius:50%;object-fit:cover;
         border:2px solid #fff;display:none;
         }
         #hamburger{width:36px;height:36px;cursor:pointer}

         /* SEARCH BAR STYLING */
         .search-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto 20px auto;
            position: relative;
            display: flex;
            align-items: center;
         }
         .search-container input {
            width: 100%;
            padding: 15px 20px 15px 45px;
            border-radius: 30px;
            border: 4px solid #fff;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s;
         }
         .search-container input:focus {
            background: rgba(255,255,255,0.2);
            border-color: var(--primary-color);
            box-shadow: 0 0 15px var(--primary-color);
         }
         .search-icon {
            position: absolute;
            left: 15px;
            width: 20px;
            height: 20px;
            color: #aaa;
            pointer-events: none;
         }

         /* SPECIAL LAUNCHER BUTTONS */
         .special-section {
            margin-top: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 10px;
         }
         .button-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
         }
         .specialBtn {
            background: var(--primary-color);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            border: 4px solid #fff;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
         }
         .specialBtn:hover {
            background: var(--primary-hover);
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
         }

         /* GAMES GRID */
         .content{
         margin-top: 20px;padding-bottom:48px;
         display:flex;flex-wrap:wrap;justify-content:center;gap:12px
         }
         .card{
         width:240px;height:160px;border-radius:8px;overflow:hidden;
         background:linear-gradient(180deg,rgba(120,120,120,0.45),rgba(80,80,80,0.45));
         position:relative;filter:brightness(.85);
         transition:transform .18s,filter .18s;
         cursor: pointer;
         }
         .card img{width:100%;height:100%;object-fit:cover}
         .card:hover{transform:translateY(-6px);filter:brightness(1)}
         .card.hidden { display: none; }
         .playBtn{
         position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
         background:#02a646;border:6px solid #fff;padding:8px 12px;
         border-radius:999px;color:#fff;cursor:pointer;
         pointer-events: none;
         }

         /* MENUS */
         #accountMenu, #newsletterMenu, #settingsMenu{
         position:fixed;top:0;right:-420px;width:380px;height:100%;
         background:#161f16;border-left:6px solid var(--primary-color);
         padding:20px;transition:right .28s;z-index:80;color:#fff;overflow:auto;
         }
         #accountMenu input,#accountMenu button, .menu-close-btn, #settingsMenu input[type="color"]{
         width:100%;padding:10px;margin-top:8px;border-radius:8px;border:none
         }
         #accountMenu button, .menu-close-btn{background: var(--primary-color); color:#fff;cursor:pointer}

         .master-update-img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 2px solid var(--primary-color);
         }

         /* SETTINGS UI */

            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;

            background: none;
         }

            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-weight: bold;

         /* NEWSLETTER CONTENT STYLING */

            border: 1px solid #444;
         }
         .newsletter-footer { margin-top: 10px; font-style: italic; color: #888; text-align: right; }

         /* POPUP STYLING */
         .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
         }
         .modal-content {
            background: #161f16;

            border: 4px solid var(--primary-color);
            text-align: center;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
         }
         .modal-content h2 { font-size: 2rem; color: #00ff00; margin-bottom: 15px; }
         
         /* CATEGORY STYLING */
         .category-section {
            text-align: left;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 6px;
         }
         .category-title {
            color: #00ff00;
            font-weight: bold;
            border-bottom: 1px solid var(--primary-color);
            margin-bottom: 10px;
            padding-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
         }
         .category-items {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
         }

            border: 2px solid transparent;

         .category-tag-btn:hover {

            color: #000;
            transform: scale(1.05);
            border-color: #fff;
         }

            background: #000;

            border: none;

            right: 20px;

            border: 1px solid rgba(255,255,255,0.4);

            z-index: 3100;

         // List of games that should open in the launcher's built-in preview frame
         const previewGames = ['Super Mario Bros', 'Pokemon Roulette', 'GBA Emulator (113 Games)', 'Jelly Mario', 'Minigames', 'Secondary GBA Emulator', 'Camo Games', 'Edpuzzle Games', 'Pizza Edition Grid', 'FreezeNova', 'Hooda Math', 'PL2W Game', 'Baldi\'s Basics', 'FNAF World', 'Ultimate Custom Night', 'People Playground', 'Bendy and the Ink Machine', 'Mario Kart Double Dash', 'Mystery Game (1.21)', 'Infared Movies', 'Infared Bypass', 'Infared Launcher', 'Cool Math Games', 'Circle Defense', 'InvisiProxy'];

         /* MARIO VIDEO LOGIC */
         const marioLiverBtn = document.getElementById('marioLiverBtn');
         const videoOverlay = document.getElementById('videoOverlay');
         const launcherVideo = document.getElementById('launcherVideo');
         const closeVideo = document.getElementById('closeVideo');

         marioLiverBtn.onclick = () => {
            videoOverlay.style.display = 'block';
            launcherVideo.play();
         };

         closeVideo.onclick = () => {
            videoOverlay.style.display = 'none';
            launcherVideo.pause();
            launcherVideo.currentTime = 0;
         };

         /* RICKROLL LOGIC */
         const susButton = document.getElementById('susButton');
         const rickrollOverlay = document.getElementById('rickrollOverlay');
         const rickrollVideo = document.getElementById('rickrollVideo');
         const rickrollAudio = document.getElementById('rickrollAudio');
         const closeRickroll = document.getElementById('closeRickroll');
         let vPromise = null, aPromise = null;

         susButton.onclick = () => {
            rickrollOverlay.style.display = 'block';
            rickrollAudio.currentTime = 0;
            vPromise = rickrollVideo.play();
            aPromise = rickrollAudio.play();
         };

         closeRickroll.onclick = async () => {
            if (vPromise) { try { await vPromise; rickrollVideo.pause(); } catch(e) {} }
            if (aPromise) { try { await aPromise; rickrollAudio.pause(); } catch(e) {} }
            rickrollOverlay.style.display = 'none';
         };

         /* NAVIGATION & MENUS */
         const accountMenu = document.getElementById('accountMenu');
         const settingsMenu = document.getElementById('settingsMenu');
         const newsletterMenu = document.getElementById('newsletterMenu');
         const countModal = document.getElementById('countModal');
         const seriesModal = document.getElementById('seriesModal');

         function closeAllMenus() {
            accountMenu.style.right = "-420px";
            settingsMenu.style.right = "-420px";
            newsletterMenu.style.right = "-420px";
         }

         document.getElementById('hamburger').onclick = () => { closeAllMenus(); accountMenu.style.right = "0"; };
         document.getElementById('settingsTabBtn').onclick = () => { closeAllMenus(); settingsMenu.style.right = "0"; };
         document.getElementById('newsletterTabBtn').onclick = () => { closeAllMenus(); newsletterMenu.style.right = "0"; };
         document.getElementById('closeMenu').onclick = closeAllMenus;
         document.getElementById('closeSettings').onclick = closeAllMenus;
         document.getElementById('closeNewsletter').onclick = closeAllMenus;

         /* THEME LOGIC */
         const rgbPicker = document.getElementById('rgbPicker');
         const resetThemeBtn = document.getElementById('resetThemeBtn');
         rgbPicker.oninput = (e) => {
            document.documentElement.style.setProperty('--primary-color', e.target.value);
            localStorage.setItem('launcherThemeColor', e.target.value);
         };
         resetThemeBtn.onclick = () => {
            document.documentElement.style.setProperty('--primary-color', '#00b500');
            localStorage.removeItem('launcherThemeColor');
         };

         /* SEARCH LOGIC */
         const mainSearch = document.getElementById('mainSearch');
         mainSearch.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
               const title = card.getAttribute('data-title').toLowerCase();
               if (title.includes(term)) {
                  card.classList.remove('hidden');
               } else {
                  card.classList.add('hidden');
               }
            });
         });

         /* PREVIEW LOGIC */
         const previewOverlay = document.getElementById('previewOverlay');
         const previewFrame = document.getElementById('previewFrame');
         function launchGame(gameData) {
            const [name, img, url] = gameData;
            if (previewGames.includes(name)) {
               previewFrame.src = url;
               previewOverlay.style.display = 'block';
            } else {
               location.href = url;
            }
         }
         document.getElementById('closePreview').onclick = () => {
            previewOverlay.style.display = 'none';
            previewFrame.src = '';
         };

         /* RENDER GAMES */
         const gameGrid = document.getElementById('gameGrid');
         games.forEach(g => {
            const card = document.createElement("div");
            card.className = "card";
            card.setAttribute('data-title', g);
            
            const img = document.createElement("img");
            img.src = g;
            img.alt = g;
            img.onerror = function() {
               this.onerror = null;
               this.src = 'https://placehold.co/240x160/333333/white?text=No+Image';
            };
            
            card.appendChild(img);
            card.innerHTML += `<div class="playBtn">Play</div>`;
            card.onclick = () => launchGame(g);
            gameGrid.appendChild(card);
         });

         /* SPECIAL BUTTON LOGIC */
         document.getElementById('mysteryBtn').onclick = () => {
            const mysteryGame = games.find(g => g === 'Mystery Game (1.21)');
            if (mysteryGame) launchGame(mysteryGame);
         };

         document.getElementById('randomGameBtn').onclick = () => {
            const randomG = games[Math.floor(Math.random() * games.length)];
            launchGame(randomG);
         };

         /* MODAL LOGIC */
         document.getElementById('countGamesBtn').onclick = () => {
            document.getElementById('totalGamesCount').textContent = games.length;
            document.getElementById('countModal').style.display = 'flex';
         };
         document.getElementById('closeModal').onclick = () => document.getElementById('countModal').style.display = 'none';

         /* SERIES LOGIC */
         const seriesBtn = document.getElementById('seriesBtn');
         const seriesContainer = document.getElementById('seriesContainer');
         
         seriesBtn.onclick = () => {
            seriesContainer.innerHTML = "";
            seriesData.forEach(s => {
               const section = document.createElement("div");
               section.className = "category-section";
               section.innerHTML = `<div class="category-title">${s.title}</div>`;
               
               const itemContainer = document.createElement("div");
               itemContainer.className = "category-items";
               
               s.items.forEach(item => {
                  const btn = document.createElement("button");
                  btn.className = "category-tag-btn";
                  btn.textContent = item;
                  btn.onclick = () => { location.href = item; };
                  itemContainer.appendChild(btn);
               });
               
               section.appendChild(itemContainer);
               seriesContainer.appendChild(section);
            });
            seriesModal.style.display = 'flex';
         };
         document.getElementById('closeSeriesModal').onclick = () => seriesModal.style.display = 'none';

         /* WINDOW CLICK LOGIC (CLOSE MODALS) */
         window.onclick = (event) => {
            if (event.target == countModal) countModal.style.display = 'none';
            if (event.target == seriesModal) seriesModal.style.display = 'none';
         };

      </script>
